name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Fake credentials — the test suite mocks Supabase/OpenAI/Pinecone throughout
      # and does not hit live services. Real secrets are never needed here.
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_KEY: fake-service-key
      SUPABASE_JWT_SECRET: fake-jwt-secret-longer-than-32-chars-ok
      OPENAI_API_KEY: sk-fake
      PINECONE_API_KEY: fake-pinecone
      PINECONE_HOST: https://fake.pinecone.io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -q
